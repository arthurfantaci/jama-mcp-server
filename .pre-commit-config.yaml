# Pre-commit hooks for the Jama MCP Server project.
# Install:    pre-commit install
# Run all:    pre-commit run --all-files

repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: uv run ruff check --fix
        language: system
        types: [python]
        pass_filenames: false

      - id: ruff-format
        name: ruff format
        entry: uv run ruff format
        language: system
        types: [python]
        pass_filenames: false

      - id: mypy
        name: mypy
        entry: uv run mypy src/
        language: system
        types: [python]
        pass_filenames: false

      - id: validate-docs-placement
        name: validate docs placement
        entry: .claude/hooks/validate-docs-placement.sh
        language: script
        files: ^docs/.*\.md$
        exclude: ^docs/internal/
        pass_filenames: false

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-json
        # Exclude JSONC files (JSON with Comments) used by VS Code and similar tools.
        # The standard check-json hook does not support comments or trailing commas.
        exclude: ^\.vscode/.*\.json$
      - id: check-added-large-files
        args: ['--maxkb=1000']
      - id: check-merge-conflict
      - id: detect-private-key

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks
